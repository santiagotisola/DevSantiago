# =============================================================================
# CondoSync — stack COMPARTILHADA (postgres, redis, caddy)
# =============================================================================
# Esta stack NUNCA é reiniciada em um deploy de aplicação.
# Subir uma única vez:
#   docker compose -f deploy/compose/docker-compose.shared.yml --env-file .env.production up -d
#
# Quando precisar atualizar Caddy/Postgres/Redis (raro):
#   - Postgres/Redis: planejar janela de manutenção + backup obrigatório
#   - Caddy: docker compose ... up -d caddy   (recreate sem afetar apps)
# =============================================================================

name: condosync

networks:
  proxy:
    name: condosync_proxy
    driver: bridge
  data:
    name: condosync_data
    driver: bridge
    internal: true        # postgres + redis sem rota para internet

volumes:
  postgres_data:
    name: condosync_postgres_data
  redis_data:
    name: condosync_redis_data
  caddy_data:
    name: condosync_caddy_data
  caddy_config:
    name: condosync_caddy_config
  uploads_data:
    name: condosync_uploads_data
  api_logs:
    name: condosync_api_logs

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — fonte da verdade. Restart manual apenas, nunca em deploy.
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: condosync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Backup-friendly: WAL archiving on disk para PITR manual
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    # Sem ports: — postgres NUNCA exposto fora da rede docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ────────────────────────────────────────────────────────────────────────────
  # Redis — sessoes, BullMQ, cache, leader lock. Senha obrigatoria.
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: condosync-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "noeviction"          # BullMQ exige noeviction
    volumes:
      - redis_data:/data
    networks:
      - data
    # Sem ports:
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ────────────────────────────────────────────────────────────────────────────
  # Caddy — proxy reverso com TLS automatico (Lets Encrypt).
  # Reload atomico: docker exec condosync-caddy caddy reload --config /etc/caddy/Caddyfile
  # ────────────────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: condosync-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"        # HTTP/3
      # Admin API exposta SO em loopback do host:
      - "127.0.0.1:2019:2019"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../caddy/snippets:/etc/caddy/snippets:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
