services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: condosync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER obrigatorio no .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio no .env}"
      POSTGRES_DB: "${POSTGRES_DB:-condosync}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind apenas em loopback — banco não deve estar exposto na rede do host.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── API (Backend) ────────────────────────────────────────────────────────
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: condosync-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "3333"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-condosync}?schema=public"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET obrigatorio - gerar com openssl rand -base64 48}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET obrigatorio e DIFERENTE de JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-1h}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_EXPIRES_IN:-7d}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:80,http://localhost}"
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-12}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ASAAS_WEBHOOK_TOKEN: "${ASAAS_WEBHOOK_TOKEN:-}"
      SMTP_HOST: "${SMTP_HOST:-mailpit}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_USER: "${SMTP_USER:-condosync}"
      SMTP_PASS: "${SMTP_PASS:-condosync}"
      SMTP_FROM: "${SMTP_FROM:-CondoSync <noreply@condosync.com.br>}"
    ports:
      - "3333:3333"
    volumes:
      - api_logs:/app/logs
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Web (Frontend nginx) ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: condosync-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      - API_URL=http://api:3333

  # ─── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: condosync-redis
    restart: unless-stopped
    # Senha obrigatória; bind apenas em loopback.
    command:
      ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD obrigatorio no .env}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Mailpit (capturador de email para desenvolvimento) ───────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: condosync-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"

volumes:
  postgres_data:
  api_logs:
  redis_data:
  uploads_data:
