services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: condosync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-condosync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-condosync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-condosync} -d ${POSTGRES_DB:-condosync}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: condosync-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ─── API (Backend) ────────────────────────────────────────────────────────
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: condosync-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-condosync}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-condosync}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGINS: ${CORS_ORIGINS}
      # URL publica do app — base dos links de convite/reset enviados por e-mail.
      # Obrigatoria: sem ela os e-mails apontariam para o host de desenvolvimento.
      FRONTEND_URL: "${FRONTEND_URL:?FRONTEND_URL obrigatorio - URL publica do app, ex https://condosync.app}"
      BCRYPT_ROUNDS: "12"
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Email desabilitado — sem mailpit em produção
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-CondoSync <noreply@condosync.com.br>}
      # Resend — email transacional em prod (obrigatorio por env.ts)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # Web Push (Q1.3) — gerar com `npx web-push generate-vapid-keys`
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:contato@condosync.app}
      # WebAuthn / Passkeys (Q1.5) — RP_ID fixo no dominio definitivo
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-CondoSync}
    ports:
      - "3333:3333"
    volumes:
      - api_logs:/app/logs
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Web (Frontend nginx) ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: condosync-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:3333
    ports:
      - "80:8080"

volumes:
  postgres_data:
  api_logs:
  redis_data:
  uploads_data:
