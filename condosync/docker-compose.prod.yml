# ─── CondoSync Production Docker Compose ────────────────────────────────────
# Deploy com HTTPS via Let's Encrypt (Certbot)
# Uso: docker compose -f docker-compose.prod.yml up -d
#
# Pré-requisitos:
# 1. Apontar DNS para o IP do servidor: ${DOMAIN} → IP
# 2. Configurar .env.production com variáveis reais
# 3. Rodar certbot init: ./scripts/init-letsencrypt.sh

services:
  # ─── Nginx Reverse Proxy (HTTPS) ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: condosync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  # ─── Certbot (SSL auto-renewal) ───────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: condosync-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: condosync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER obrigatorio no .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio no .env}"
      POSTGRES_DB: "${POSTGRES_DB:-condosync}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind apenas em loopback — banco não deve estar exposto na rede do host.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: condosync-redis
    restart: unless-stopped
    # Senha obrigatória; bind apenas em loopback.
    command:
      ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD obrigatorio no .env}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── API (Backend) ────────────────────────────────────────────────────────
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: condosync-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "3333"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-condosync}?schema=public"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET obrigatorio - gerar com openssl rand -base64 48}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET obrigatorio e DIFERENTE de JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-1h}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_EXPIRES_IN:-7d}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://${DOMAIN},https://www.${DOMAIN},https://app.${DOMAIN}}"
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-12}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      # ─── IA ───────────────────────────────────────────────────────────────
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # ─── Pagamentos (ASAAS) ────────────────────────────────────────────────
      ASAAS_API_KEY: "${ASAAS_API_KEY:-}"
      ASAAS_WEBHOOK_TOKEN: "${ASAAS_WEBHOOK_TOKEN:-}"
      ASAAS_ENV: "${ASAAS_ENV:-sandbox}"
      # ─── Email (Resend + SMTP fallback) ───────────────────────────────────
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-CondoSync <noreply@${DOMAIN}>}"
      # ─── Push (Web Push / VAPID) ──────────────────────────────────────────
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_EMAIL: "${VAPID_EMAIL:-noreply@${DOMAIN}}"
      # ─── Monitoring ────────────────────────────────────────────────────────
      SENTRY_DSN: "${SENTRY_DSN:-}"
    # Sem porta publicada no host — acesso somente via nginx (reverse proxy).
    expose:
      - "3333"
    volumes:
      - api_logs:/app/logs
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Web (Frontend nginx-unprivileged) ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: condosync-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # nginx-unprivileged escuta em 8080 internamente; o reverse proxy expõe.
    expose:
      - "8080"
    environment:
      - API_URL=http://api:3333

volumes:
  postgres_data:
  api_logs:
  redis_data:
  uploads_data:
