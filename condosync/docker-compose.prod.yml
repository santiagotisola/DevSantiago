# ─── CondoSync Production Docker Compose ────────────────────────────────────
# Deploy com HTTPS via Let's Encrypt (Certbot)
# Uso: docker compose -f docker-compose.prod.yml up -d
#
# Pré-requisitos:
# 1. Apontar DNS para o IP do servidor: condosync.com.br → IP
# 2. Configurar .env.production com variáveis reais
# 3. Rodar certbot init: ./scripts/init-letsencrypt.sh

services:
  # ─── Nginx Reverse Proxy (HTTPS) ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: condosync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  # ─── Certbot (SSL auto-renewal) ───────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: condosync-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: condosync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-condosync}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-condosync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-condosync} -d ${DB_NAME:-condosync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: condosync-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  # ─── API (Backend) ────────────────────────────────────────────────────────
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: condosync-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${DB_USER:-condosync}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-condosync}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: https://${DOMAIN},https://www.${DOMAIN},https://app.${DOMAIN}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      SMTP_FROM: noreply@${DOMAIN}
      # Push
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: noreply@${DOMAIN}
      # Sentry
      SENTRY_DSN: ${SENTRY_DSN}
      # ASAAS
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Web (Frontend) ───────────────────────────────────────────────────────
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: condosync-web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
