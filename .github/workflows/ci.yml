name: CI/CD CondoSync

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Testes e cobertura da API ───────────────────────────────────────────────
  test-api:
    name: Testes API (Vitest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: condosync
          POSTGRES_PASSWORD: condosync123
          POSTGRES_DB: condosync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: condosync/apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm install

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Aplicar migrations (test DB)
        env:
          DATABASE_URL: postgresql://condosync:condosync123@localhost:5432/condosync_test?schema=public
        run: npx prisma migrate deploy

      - name: Executar testes com cobertura
        env:
          DATABASE_URL: postgresql://condosync:condosync123@localhost:5432/condosync_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-here
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          NODE_ENV: test
          BCRYPT_ROUNDS: "4"
          CORS_ORIGINS: http://localhost:5173
          FRONTEND_URL: http://localhost:5173
          SMTP_HOST: ""
          RESEND_API_KEY: ""
        run: npm run test:coverage

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/lcov.info
          flags: api
          fail_ci_if_error: false

  # ─── Build do frontend Web ───────────────────────────────────────────────────
  build-web:
    name: Build Web (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: condosync/apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm install

      - name: Build de produção
        env:
          # URL da API em produção — altere aqui ou configure vars.VITE_API_URL no GitHub Settings
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || 'https://web-production-916b1.up.railway.app/api/v1' }}
        run: npm run build

      - name: Verificar tamanho dos bundles
        run: |
          echo "=== Tamanho dos bundles ==="
          du -sh dist/
          ls -lh dist/assets/*.js | sort -k5 -rh | head -10

  # ─── Build Mobile ────────────────────────────────────────────────────────────
  build-mobile:
    name: Build Mobile (Vite PWA)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: condosync/apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm install

      - name: Build de produção
        env:
          # URL da API em produção — altere aqui ou configure vars.VITE_API_URL no GitHub Settings
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || 'https://web-production-916b1.up.railway.app/api/v1' }}
        run: npm run build

  # ─── TypeScript type-check da API ────────────────────────────────────────────
  typecheck-api:
    name: TypeScript Check (API)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: condosync/apps/api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npx prisma generate
      - run: npx tsc --noEmit

  # ─── Deploy para VPS Hostinger (push na main) ────────────────────────────────
  deploy:
    name: Deploy → VPS (2.24.211.167)
    needs: [test-api, build-web, build-mobile]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.VPS_SSH_KEY != ''

    steps:
      - name: Deploy via SSH na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 2.24.211.167
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          script: |
            cd /opt/condosync
            git pull
            cd condosync
            docker compose -f docker-compose.railway.yml up -d --build
            echo "✅ Deploy concluído!"
            docker compose -f docker-compose.railway.yml ps
